events {}

http {
    # Otomatis alihkan HTTP ke HTTPS
    server {
        listen 80;
        server_name edy-kelvianto.com www.edy-kelvianto.com;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name edy-kelvianto.com www.edy-kelvianto.com;

        ssl_certificate     /etc/letsencrypt/live/edy-kelvianto.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/edy-kelvianto.com/privkey.pem;

        location / {
            proxy_pass http://steam-portfolio:8080;

            # --- CRITICAL FOR BLAZOR / SIGNALR ---
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            # -------------------------------------


            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Increase timeouts so the connection doesn't drop while user is reading
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }
    }
}